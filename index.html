<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rasayana · Cocina Ayurvédica</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --sage: #6B7F5E; --earth: #C4956A; --cream: #FAF7F2; --white: #FFFFFF; --text: #2C2C28; --border: #E2DDD4; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
    header { background: var(--cream); border-bottom: 1px solid var(--border); padding: 15px 20px; text-align: center; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--sage); letter-spacing: 1px; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 15px; }
    .user { align-self: flex-end; background: var(--sage); color: white; border-bottom-right-radius: 2px; }
    .app { align-self: flex-start; background: var(--white); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
    .input-box { padding: 20px; background: var(--cream); border-top: 1px solid var(--border); display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; }
    button { background: var(--sage); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 500; }
    button:disabled { opacity: 0.5; }
    .recipe-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .recipe-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--sage); margin-bottom: 10px; }
  </style>
</head>
<body>
  <header><div class="logo">Rasa<span>yana</span></div></header>
  <div id="chat">
    <div class="msg app">Hola Manel. ¿Qué te apetece cocinar hoy siguiendo tu equilibrio Vata-Pitta?</div>
  </div>
  <div class="input-box">
    <input type="text" id="userInput" placeholder="Escribe un ingrediente o cómo te sientes..." onkeypress="if(event.key==='Enter') send()">
    <button id="btn" onclick="send()">Enviar</button>
  </div>

  <script>
    const API_URL = 'https://rasayana-proxy.manel89.workers.dev';
    let history = [];

    function addMsg(text, type) {
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      div.innerText = text;
      document.getElementById('chat').appendChild(div);
      document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }

    function addRecipe(recipe) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = 'recipe-card';
      div.innerHTML = `
        <div class="recipe-title">${recipe.nombre}</div>
        <p><i>${recipe.dosha_nota}</i></p>
        <strong>Ingredientes:</strong><ul>${recipe.ingredientes.map(i => `<li>${i}</li>`).join('')}</ul>
        <strong>Pasos:</strong><ol>${recipe.pasos.map(p => `<li>${p}</li>`).join('')}</ol>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const input = document.getElementById('userInput');
      const btn = document.getElementById('btn');
      const text = input.value.trim();
      if (!text || btn.disabled) return;

      addMsg(text, 'user');
      input.value = '';
      btn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [...history, { role: 'user', content: text }]
          })
        });

        const data = await response.json();
        const reply = data.choices[0].message.content;

        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: reply });

        if (reply.includes('{')) {
          const json = JSON.parse(reply.substring(reply.indexOf('{'), reply.lastIndexOf('}') + 1));
          addRecipe(json);
        } else {
          addMsg(reply, 'app');
        }
      } catch (e) {
        addMsg('Hay un pequeño problema técnico con el Worker. Revisa la API Key en Cloudflare.', 'app');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
