<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rasayana Chat</title>
    <style>
        body { font-family: sans-serif; background: #FAF7F2; padding: 20px; display: flex; flex-direction: column; height: 90vh; }
        #chat { flex: 1; overflow-y: auto; border: 1px solid #E2DDD4; background: white; padding: 20px; margin-bottom: 10px; border-radius: 10px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .user { background: #6B7F5E; color: white; align-self: flex-end; text-align: right; }
        .app { background: #F5EDE3; color: #2C2C28; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #6B7F5E; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🌿 Rasayana AI</h2>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" id="sendBtn">Enviar</button>
    </div>

    <script>
        const API_URL = 'https://rasayana-proxy.manel89.workers.dev';
        let history = [];

        function addMessage(text, role) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'msg ' + (role === 'user' ? 'user' : 'app');
            div.innerText = (role === 'user' ? 'Tú: ' : 'AI: ') + text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [...history, { role: 'user', content: text }]
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    addMessage(reply, 'app');
                    history.push({ role: 'user', content: text });
                    history.push({ role: 'assistant', content: reply });
                } else {
                    throw new Error();
                }
            } catch (e) {
                addMessage('Error: El Worker no pudo conectar con Gemini. Revisa la API Key.', 'app');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
