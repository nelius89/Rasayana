<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rasayana · Tu guía de cocina ayurvédica</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sage: #6B7F5E; --sage-light: #8FA37E; --sage-pale: #EDF0E8;
      --earth: #C4956A; --earth-pale: #F5EDE3; --cream: #FAF7F2;
      --text: #2C2C28; --text-muted: #8A8A7A; --border: #E2DDD4;
      --white: #FFFFFF; --chat-max: 680px;
    }
    html, body { height: 100%; background: var(--cream); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--cream); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.08em; color: var(--sage); }
    .logo span { color: var(--earth); font-style: italic; }
    .dosha-badge { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); background: var(--sage-pale); padding: 4px 10px; border-radius: 20px; }
    .chat-wrapper { display: flex; flex-direction: column; height: 100vh; padding-top: 60px; }
    .messages { flex: 1; overflow-y: auto; padding: 28px 20px 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    .msg { display: flex; flex-direction: column; max-width: var(--chat-max); animation: fadeUp 0.3s ease forwards; opacity: 0; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.app { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .msg-bubble { padding: 14px 18px; border-radius: 18px; line-height: 1.65; }
    .msg.app .msg-bubble { background: var(--white); border: 1px solid var(--border); border-bottom-left-radius: 4px; font-size: 14.5px; }
    .msg.user .msg-bubble { background: var(--sage); color: var(--white); border-bottom-right-radius: 4px; font-size: 14.5px; }
    .msg-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
    .msg.user .msg-label { text-align: right; }
    .recipe-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; max-width: var(--chat-max); align-self: flex-start; animation: fadeUp 0.4s ease forwards; opacity: 0; }
    .recipe-header { background: linear-gradient(135deg, var(--sage) 0%, var(--sage-light) 100%); padding: 22px 22px 18px; color: white; }
    .recipe-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.8; margin-bottom: 6px; }
    .recipe-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; line-height: 1.2; }
    .recipe-meta { display: flex; gap: 16px; font-size: 12px; opacity: 0.85; margin-top: 10px; }
    .recipe-body { padding: 20px 22px; }
    .recipe-section { margin-bottom: 18px; }
    .recipe-section-title { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--earth); margin-bottom: 8px; }
    .recipe-dosha { background: var(--sage-pale); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--sage); margin-bottom: 18px; }
    .recipe-actions { padding: 16px 22px; border-top: 1px solid var(--border); background: var(--cream); }
    .btn-save { width: 100%; padding: 10px 16px; background: var(--earth); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 500; }
    .btn-save.saved { background: var(--sage); }
    .typing { display: flex; align-items: center; gap: 5px; padding: 14px 18px; background: var(--white); border: 1px solid var(--border); border-radius: 18px; width: fit-content; }
    .typing span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    .input-area { padding: 16px 20px 24px; background: var(--cream); border-top: 1px solid var(--border); }
    .input-row { display: flex; gap: 10px; max-width: var(--chat-max); margin: 0 auto; }
    .chat-input { flex: 1; padding: 13px 16px; border: 1px solid var(--border); border-radius: 14px; outline: none; resize: none; }
    .send-btn { width: 48px; height: 48px; background: var(--sage); border: none; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .send-btn svg { fill: white; width: 20px; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .suggestion-btn { padding: 10px 16px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; margin-top: 10px; width: 100%; max-width: 320px; text-align: left; }
  </style>
</head>
<body>
<header>
  <div class="logo">Rasa<span>yana</span></div>
  <div class="dosha-badge">Vata · Pitta</div>
</header>
<div class="chat-wrapper">
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🌿</div>
      <div class="empty-title">Hola, Manel.<br>¿Qué cocinamos hoy?</div>
      <div class="suggestion-btn" onclick="useSuggestion(this)">No sé qué cenar, algo ligero 🌙</div>
      <div class="suggestion-btn" onclick="useSuggestion(this)">Tengo garbanzos, ¿alguna idea?</div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="Escribe aquí..." rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>
</div>
<script>
  const API_URL = 'https://rasayana-proxy.manel89.workers.dev';
  let conversationHistory = [];

  function useSuggestion(btn) {
    document.getElementById('chatInput').value = btn.innerText;
    sendMessage();
  }

  function addTextMessage(text, role) {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = `msg ${role === 'user' ? 'user' : 'app'}`;
    el.innerHTML = `<div class="msg-label">${role === 'user' ? 'Tú' : 'Rasayana'}</div><div class="msg-bubble">${text}</div>`;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addRecipeCard(recipe) {
    const msgs = document.getElementById('messages');
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      <div class="recipe-header"><div class="recipe-name">${recipe.nombre}</div></div>
      <div class="recipe-body">
        <div class="recipe-dosha">${recipe.dosha_nota}</div>
        <div class="recipe-section-title">Ingredientes</div>
        <ul>${recipe.ingredientes.map(i => `<li>${i}</li>`).join('')}</ul>
        <div class="recipe-section-title">Pasos</div>
        <ol>${recipe.pasos.map(p => `<li>${p}</li>`).join('')}</ol>
      </div>`;
    msgs.appendChild(card);
    msgs.scrollTop = msgs.scrollHeight;
  }

async function sendMessage(overrideText) {
    if (isLoading) return;
    const input = document.getElementById('chatInput');
    const text = overrideText || input.value.trim();
    if (!text) return;

    if (!overrideText) {
      input.value = '';
      autoResize(input);
    }

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    addUserMessage(text);
    
    // Formateamos los mensajes de forma limpia para el Worker
    const messagesToSend = [
      { role: 'user', content: SYSTEM_PROMPT },
      ...conversationHistory.map(m => ({
        role: m.role === 'model' ? 'assistant' : 'user',
        content: m.parts[0].text
      })),
      { role: 'user', content: text }
    ];

    addTyping();

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: messagesToSend }) // Solo enviamos los mensajes
      });

      const data = await response.json();
      removeTyping();

      if (!response.ok) throw new Error('Error en el Worker');

      const rawText = data.choices[0].message.content;
      
      // Guardamos en el historial local
      conversationHistory.push({ role: 'user', parts: [{ text }] });
      conversationHistory.push({ role: 'model', parts: [{ text: rawText }] });

      const jsonMatch = rawText.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        try {
          const recipe = JSON.parse(jsonMatch[0]);
          addRecipeCard(recipe);
        } catch (e) {
          addTextMessage(rawText);
        }
      } else {
        addTextMessage(rawText);
      }

    } catch (err) {
      removeTyping();
      addTextMessage('Error de conexión. Revisa que el Worker tenga la API Key y el código correcto.');
      console.error(err);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
</script>
</body>
</html>
